<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Tracker - ADHD Optimized</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #050508 0%, #1a1a2e 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00d9ff;
        }
        
        h1 {
            font-size: 2em;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        
        .date {
            color: #888;
            font-size: 0.9em;
        }
        
        /* Today's Reminders */
        .reminders-section {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        
        .section-title {
            font-size: 1.2em;
            color: #00d9ff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .reminder-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .reminder-time {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
        }
        
        .reminder-status {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-pending {
            background: #ff9800;
            color: #000;
        }
        
        .status-taken {
            background: #4caf50;
            color: #fff;
        }
        
        .status-missed {
            background: #f44336;
            color: #fff;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #00d9ff;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #00b8cc;
            transform: scale(1.05);
        }
        
        .btn-primary:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        /* Weekly Chart */
        .chart-section {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .day-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .day-name {
            font-weight: 600;
            color: #00d9ff;
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        
        .day-checklist {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .med-check {
            font-size: 0.8em;
            padding: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .med-check.taken {
            background: #4caf50;
            color: #fff;
        }
        
        .med-check.missed {
            background: #f44336;
            color: #fff;
        }
        
        .med-check.pending {
            background: #ff9800;
            color: #000;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid #00d9ff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #888;
        }
        
        /* Streak */
        .streak-box {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
        }
        
        .streak-flame {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .streak-number {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .streak-text {
            font-size: 1em;
            opacity: 0.9;
        }
        
        /* Insights */
        .insights-section {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .insight {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00d9ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .insight-icon {
            margin-right: 10px;
        }
        
        .insight-title {
            font-weight: 600;
            color: #00d9ff;
        }
        
        .insight-text {
            font-size: 0.9em;
            color: #bbb;
            margin-top: 5px;
        }
        
        footer {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💊 Medication Tracker</h1>
            <p class="date" id="currentDate"></p>
        </header>
        
        <!-- Streak -->
        <div class="streak-box" id="streakBox">
            <div class="streak-flame">🔥</div>
            <div class="streak-number" id="streakNumber">0</div>
            <div class="streak-text">Day Streak - Keep Going!</div>
        </div>
        
        <!-- Today's Reminders -->
        <div class="reminders-section">
            <div class="section-title">Today's Reminders</div>
            <div class="reminder-card">
                <div class="reminder-time">9:00 AM</div>
                <div class="reminder-status">
                    <span class="status-badge status-pending" id="status-9am">Pending</span>
                    <button class="btn btn-primary" id="btn-9am" onclick="confirmMeds('9am')">✅ Took Meds</button>
                </div>
            </div>
            <div class="reminder-card">
                <div class="reminder-time">6:30 PM</div>
                <div class="reminder-status">
                    <span class="status-badge status-pending" id="status-630pm">Pending</span>
                    <button class="btn btn-primary" id="btn-630pm" onclick="confirmMeds('630pm')">✅ Took Meds</button>
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="adherenceRate">0%</div>
                <div class="stat-label">Adherence Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="thisWeekCount">0/14</div>
                <div class="stat-label">This Week's Doses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastTaken">Never</div>
                <div class="stat-label">Last Taken</div>
            </div>
        </div>
        
        <!-- Weekly Chart -->
        <div class="chart-section">
            <div class="section-title">This Week's Pattern</div>
            <div class="week-grid" id="weekGrid"></div>
        </div>
        
        <!-- Insights -->
        <div class="insights-section" id="insightsSection" style="display: none;">
            <div class="section-title">💡 ADHD Insights</div>
            <div id="insightsList"></div>
        </div>
        
        <footer>
            Data auto-saves to your tracking file. Your privacy is protected - all data stays local.
        </footer>
    </div>
    
    <script>
        const DATA_FILE = '/root/.openclaw/workspace/medication-tracking.json';
        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        
        let data = {
            metadata: { created: new Date().toISOString() },
            recent_logs: [],
            statistics: { adherence_rate: 0, current_streak: 0, total_confirmations: 0 },
            weekly_summary: {
                adherence_by_day: {
                    Monday: { '9am': false, '6pm': false },
                    Tuesday: { '9am': false, '6pm': false },
                    Wednesday: { '9am': false, '6pm': false },
                    Thursday: { '9am': false, '6pm': false },
                    Friday: { '9am': false, '6pm': false },
                    Saturday: { '9am': false, '6pm': false },
                    Sunday: { '9am': false, '6pm': false }
                }
            }
        };
        
        // Initialize
        function init() {
            setDate();
            loadData();
            renderWeek();
            updateStats();
            generateInsights();
        }
        
        function setDate() {
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('en-AU', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        function loadData() {
            const stored = localStorage.getItem('medTracking');
            if (stored) data = JSON.parse(stored);
        }
        
        function saveData() {
            localStorage.setItem('medTracking', JSON.stringify(data));
        }
        
        function confirmMeds(time) {
            const now = new Date();
            const timestamp = now.toISOString();
            const dayKey = DAYS[now.getDay() === 0 ? 6 : now.getDay() - 1];
            const timeKey = time === '9am' ? '9am' : '6pm';
            
            // Log confirmation
            data.recent_logs.push({
                timestamp,
                time,
                status: 'taken'
            });
            
            // Update weekly summary
            const dayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
            data.weekly_summary.adherence_by_day[dayName][timeKey] = true;
            
            // Update stats
            data.statistics.total_confirmations += 1;
            data.statistics.current_streak = calculateStreak();
            data.statistics.adherence_rate = calculateAdherence();
            
            // UI feedback
            const btn = document.getElementById(`btn-${time}`);
            const status = document.getElementById(`status-${time}`);
            btn.disabled = true;
            btn.textContent = '✅ Taken!';
            status.className = 'status-badge status-taken';
            status.textContent = 'Taken';
            
            // Celebration
            showCelebration();
            
            saveData();
            updateStats();
        }
        
        function calculateStreak() {
            let streak = 0;
            const days = Object.entries(data.weekly_summary.adherence_by_day);
            for (let i = days.length - 1; i >= 0; i--) {
                const day = days[i][1];
                if (day['9am'] && day['6pm']) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }
        
        function calculateAdherence() {
            const totalDays = 7;
            const totalDoses = totalDays * 2;
            let taken = 0;
            
            Object.values(data.weekly_summary.adherence_by_day).forEach(day => {
                if (day['9am']) taken++;
                if (day['6pm']) taken++;
            });
            
            return Math.round((taken / totalDoses) * 100);
        }

            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            
            Object.entries(data.weekly_summary.adherence_by_day).forEach
